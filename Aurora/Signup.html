<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>공소 · 회원가입</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #04081C; overflow: hidden; }
  body {
    font-family: "Pretendard", -apple-system, system-ui, sans-serif;
    color: #E8EEFF;
    letter-spacing: -0.012em;
    word-break: keep-all;
    line-break: strict;
    overflow-wrap: break-word;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3, .head, .display { letter-spacing: -0.03em; }
  * { box-sizing: border-box; }
  input::placeholder { color: rgba(232,238,255,0.32); }
  input, button, textarea { letter-spacing: inherit; }
  a { color: inherit; }

  .stage {
    position: fixed; inset: 0;
    background: #04081C;
  }
  .canvas {
    width: 1440px; height: 900px;
    position: absolute;
    left: 50%; top: 50%;
    transform-origin: center center;
  }

  .grad-text {
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    display: inline-block;
  }

  .btn-primary { transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease; }
  .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.08); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { cursor: not-allowed; filter: grayscale(0.4) brightness(0.7); }

  .btn-ghost { transition: background 160ms ease, border-color 160ms ease; }
  .btn-ghost:hover { background: rgba(255,255,255,0.08) !important; }

  @keyframes gaze-pulse {
    0%, 100% { opacity: 0.85; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.6); }
  }
  .gaze-dot { animation: gaze-pulse 3.2s ease-in-out infinite; }

  @keyframes aurora-drift {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(20px,-30px) scale(1.05); }
  }
  .aurora-layer { animation: aurora-drift 18s ease-in-out infinite; }

  .nav-link { color: rgba(232,238,255,0.7); text-decoration: none; transition: color 160ms; }
  .nav-link:hover { color: #fff; }

  /* step pill */
  .step-pill { transition: background 200ms, border-color 200ms; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">

const TWEAKS = /*EDITMODE-BEGIN*/{
  "primary": "#1E5BE0",
  "accent": "#3FB6FF",
  "headline": "처음 만나서",
  "headlineGrad": "반가워요.",
  "subtitle": "이메일로 가입하면 시선 보정부터 함께 시작합니다.",
  "showSteps": true,
  "showDots": true
}/*EDITMODE-END*/;

const T = {
  serif: '"Space Grotesk", "Pretendard", -apple-system, system-ui, sans-serif',
  body: '"Pretendard", -apple-system, "Apple SD Gothic Neo", system-ui, sans-serif',
  mono: '"JetBrains Mono", ui-monospace, SFMono-Regular, monospace',
};

function BrandMark({ accent, primary }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
      <div style={{
        width: 40, height: 40, borderRadius: 12,
        background: `linear-gradient(135deg, ${primary}, ${accent})`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        boxShadow: `0 8px 24px ${primary}66`,
      }}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M2 12C4 7 7.5 5 12 5C16.5 5 20 7 22 12C20 17 16.5 19 12 19C7.5 19 4 17 2 12Z" stroke="#04102E" strokeWidth="2" />
          <circle cx="12" cy="12" r="3" fill="#04102E" />
        </svg>
      </div>
      <div>
        <div style={{ fontFamily: T.serif, fontWeight: 700, fontSize: 20, letterSpacing: '-0.02em' }}>공소</div>
        <div style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: '0.22em', color: 'rgba(232,238,255,0.5)', marginTop: 2 }}>
          GONGSO · READING
        </div>
      </div>
    </div>
  );
}

function Field({ label, type = 'text', placeholder, value, onChange, trailing, accent, autoFocus, hint, error }) {
  const [focused, setFocused] = React.useState(false);
  const borderColor = error
    ? '#FF7676'
    : focused
      ? accent
      : 'rgba(255,255,255,0.10)';
  return (
    <label style={{ display: 'block' }}>
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
        marginBottom: 8,
      }}>
        <span style={{
          fontFamily: T.body, fontSize: 12, fontWeight: 500,
          color: 'rgba(232,238,255,0.55)',
          letterSpacing: '0.04em', textTransform: 'uppercase',
        }}>{label}</span>
        {hint && (
          <span style={{ fontSize: 11, color: 'rgba(232,238,255,0.4)' }}>{hint}</span>
        )}
      </div>
      <div style={{
        display: 'flex', alignItems: 'center',
        background: 'rgba(255,255,255,0.04)',
        border: `1px solid ${borderColor}`,
        borderRadius: 12, padding: '0 16px', height: 50,
        transition: 'border 160ms ease, box-shadow 160ms ease',
        boxShadow: focused && !error ? `0 0 0 4px ${accent}1F` : 'none',
      }}>
        <input
          type={type} placeholder={placeholder} value={value} autoFocus={autoFocus}
          onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
          onChange={(e) => onChange?.(e.target.value)}
          style={{
            flex: 1, height: '100%', background: 'transparent', border: 'none', outline: 'none',
            color: '#E8EEFF', fontFamily: T.body, fontSize: 15, fontWeight: 500,
          }}
        />
        {trailing}
      </div>
      {error && (
        <div style={{ marginTop: 6, fontSize: 12, color: '#FF9494', display: 'flex', gap: 6, alignItems: 'center' }}>
          <svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="5.5" stroke="currentColor" /><path d="M6 3v3.5M6 8.5v0.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" /></svg>
          {error}
        </div>
      )}
    </label>
  );
}

function EyeToggle({ on, onToggle }) {
  return (
    <button type="button" onClick={onToggle}
      style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: 4, display: 'flex', alignItems: 'center', color: 'rgba(232,238,255,0.55)' }}
      aria-label="비밀번호 표시">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M2 12C4 7 7.5 4.5 12 4.5C16.5 4.5 20 7 22 12C20 17 16.5 19.5 12 19.5C7.5 19.5 4 17 2 12Z"
          stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" />
        <circle cx="12" cy="12" r="3" stroke="currentColor" strokeWidth="1.5" />
        {!on && <line x1="4" y1="20" x2="20" y2="4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" />}
      </svg>
    </button>
  );
}

function SocialBtn({ kind }) {
  const labels = { google: 'Google', kakao: 'Kakao', apple: 'Apple' };
  const ic = {
    google: <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.84 2.08-1.79 2.72v2.26h2.9c1.7-1.56 2.69-3.87 2.69-6.62z" fill="#4285F4"/><path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.83.86-3.06.86-2.36 0-4.36-1.59-5.07-3.74H.91v2.34A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.93 10.68A5.41 5.41 0 0 1 3.64 9c0-.58.1-1.15.29-1.68V4.98H.91A8.997 8.997 0 0 0 0 9c0 1.45.35 2.83.91 4.02l3.02-2.34z" fill="#FBBC05"/><path d="M9 3.58c1.32 0 2.51.45 3.45 1.35l2.58-2.58C13.47.89 11.43 0 9 0 5.48 0 2.44 2.02.91 4.98l3.02 2.34C4.64 5.17 6.64 3.58 9 3.58z" fill="#EA4335"/></svg>,
    kakao: <div style={{ width: 18, height: 18, borderRadius: 4, background: '#FEE500', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 800, color: '#3A1D1D' }}>K</div>,
    apple: <svg width="18" height="18" viewBox="0 0 18 18" fill="#E8EEFF"><path d="M13.95 9.6c0-2.3 1.9-3.4 2-3.4-1.1-1.6-2.8-1.8-3.4-1.8-1.4-.2-2.8.9-3.5.9-.7 0-1.9-.8-3.1-.8-1.6 0-3.1.9-3.9 2.4-1.7 2.9-.4 7.2 1.2 9.6.8 1.1 1.7 2.4 2.9 2.4 1.2-.1 1.6-.8 3-.8s1.9.8 3.1.8c1.3 0 2.1-1.2 2.9-2.3.9-1.3 1.3-2.6 1.3-2.7-.1 0-2.5-1-2.5-3.3zM11.5 3c.6-.8 1.1-2 1-3.1-1 0-2.1.7-2.8 1.5-.6.7-1.1 1.9-1 3 1.1.1 2.2-.6 2.8-1.4z"/></svg>,
  };
  return (
    <button type="button" className="btn-ghost" style={{
      flex: 1, height: 48, borderRadius: 12,
      background: 'rgba(255,255,255,0.05)',
      border: '1px solid rgba(255,255,255,0.10)',
      color: '#E8EEFF',
      display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
      fontFamily: T.body, fontSize: 13.5, fontWeight: 600, cursor: 'pointer',
    }}>{ic[kind]}<span>{labels[kind]}</span></button>
  );
}

// password strength estimator — purely visual feedback
function pwStrength(pw) {
  if (!pw) return { score: 0, label: '비밀번호를 입력하세요' };
  let s = 0;
  if (pw.length >= 8) s++;
  if (pw.length >= 12) s++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++;
  if (/\d/.test(pw)) s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  s = Math.min(s, 4);
  const labels = ['너무 짧아요', '약함', '보통', '좋음', '강력함'];
  return { score: s, label: labels[s] };
}

function Steps({ accent, primary, active = 0 }) {
  const items = [
    { n: '01', title: '계정 만들기', desc: '이메일과 비밀번호로 시작' },
    { n: '02', title: '시선 보정', desc: '9개 점을 응시하며 학습' },
    { n: '03', title: '독서 시작', desc: '실시간 집중도·역행 측정' },
  ];
  return (
    <div style={{ display: 'grid', gap: 14, marginTop: 40, maxWidth: 480 }}>
      {items.map((it, i) => {
        const isActive = i === active;
        const isDone = i < active;
        return (
          <div key={it.n} className="step-pill" style={{
            display: 'flex', alignItems: 'center', gap: 18,
            padding: '14px 18px', borderRadius: 14,
            background: isActive ? `${primary}1A` : 'rgba(255,255,255,0.025)',
            border: isActive ? `1px solid ${accent}55` : '1px solid rgba(255,255,255,0.06)',
          }}>
            <div style={{
              width: 44, height: 44, borderRadius: 12,
              background: isActive ? `linear-gradient(135deg, ${primary}, ${accent})` : 'rgba(255,255,255,0.04)',
              border: isActive ? 'none' : '1px solid rgba(255,255,255,0.08)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontFamily: T.mono, fontSize: 13, fontWeight: 600,
              color: isActive ? '#04102E' : 'rgba(232,238,255,0.55)',
              flex: 'none',
            }}>{isDone ? (
              <svg width="18" height="18" viewBox="0 0 18 18"><path d="M3 9.5L7 13L15 5" stroke={accent} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round" /></svg>
            ) : it.n}</div>
            <div style={{ flex: 1 }}>
              <div style={{
                fontFamily: T.serif, fontSize: 17, fontWeight: 600, letterSpacing: '-0.02em',
                color: isActive ? '#fff' : 'rgba(232,238,255,0.85)',
              }}>{it.title}</div>
              <div style={{ fontSize: 12.5, color: 'rgba(232,238,255,0.55)', marginTop: 2 }}>{it.desc}</div>
            </div>
            {isActive && (
              <div style={{
                fontFamily: T.mono, fontSize: 10, letterSpacing: '0.18em',
                color: accent, padding: '4px 10px', borderRadius: 999,
                background: `${accent}1A`, border: `1px solid ${accent}44`,
              }}>NOW</div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function Signup() {
  const [t, setTweak] = useTweaks(TWEAKS);
  const [email, setEmail] = React.useState('');
  const [nick, setNick] = React.useState('');
  const [pw, setPw] = React.useState('');
  const [pw2, setPw2] = React.useState('');
  const [showPw, setShowPw] = React.useState(false);
  const [agree, setAgree] = React.useState(false);
  const [agreeMkt, setAgreeMkt] = React.useState(false);
  const [scale, setScale] = React.useState(1);

  React.useEffect(() => {
    const fit = () => {
      const W = 1440, H = 900;
      setScale(Math.min(window.innerWidth / W, window.innerHeight / H));
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);

  const { accent, primary } = t;
  const strength = pwStrength(pw);
  const pw2Error = pw2 && pw2 !== pw ? '비밀번호가 일치하지 않아요' : null;
  const canSubmit = email && nick && pw && pw2 === pw && agree;

  return (
    <React.Fragment>
    <div className="stage">
    <div className="canvas" style={{ transform: `translate(-50%, -50%) scale(${scale})` }}>
    <div style={{
      width: '100%', height: '100%', position: 'relative', overflow: 'hidden',
      background: '#04081C', color: '#E8EEFF', fontFamily: T.body,
    }}>
      {/* aurora layer */}
      <div className="aurora-layer" style={{
        position: 'absolute', inset: '-10%',
        background: `
          radial-gradient(46% 38% at 18% 22%, ${accent}88 0%, transparent 70%),
          radial-gradient(56% 48% at 88% 28%, ${primary}AA 0%, transparent 70%),
          radial-gradient(50% 42% at 72% 82%, #765AFF55 0%, transparent 70%),
          radial-gradient(40% 30% at 12% 88%, ${accent}66 0%, transparent 70%)
        `,
        filter: 'blur(24px)',
      }} />
      <svg style={{ position: 'absolute', inset: 0, opacity: 0.10, mixBlendMode: 'overlay', pointerEvents: 'none' }} width="100%" height="100%">
        <filter id="noise"><feTurbulence baseFrequency="0.9" numOctaves="2" /></filter>
        <rect width="100%" height="100%" filter="url(#noise)" />
      </svg>

      {t.showDots && [
        { l: '10%', t: '12%', s: 10, d: 0 },
        { l: '24%', t: '6%', s: 4, d: 0.6 },
        { l: '76%', t: '10%', s: 6, d: 1.2 },
        { l: '92%', t: '38%', s: 12, d: 0.3 },
        { l: '14%', t: '70%', s: 7, d: 1.8 },
        { l: '85%', t: '82%', s: 5, d: 0.9 },
        { l: '52%', t: '12%', s: 3, d: 2.1 },
        { l: '40%', t: '92%', s: 8, d: 1.5 },
        { l: '66%', t: '54%', s: 4, d: 0.4 },
      ].map((d, i) => (
        <div key={i} className="gaze-dot" style={{
          position: 'absolute', left: d.l, top: d.t,
          width: d.s, height: d.s, borderRadius: '50%',
          background: accent, boxShadow: `0 0 24px ${accent}, 0 0 6px #fff`,
          animationDelay: `${d.d}s`,
        }} />
      ))}

      {/* top nav */}
      <header style={{
        position: 'relative', zIndex: 2, display: 'flex',
        justifyContent: 'space-between', alignItems: 'center',
        padding: '28px 56px',
      }}>
        <a href="Home.html" style={{ textDecoration: 'none' }}><BrandMark accent={accent} primary={primary} /></a>
        <nav style={{ display: 'flex', gap: 28, alignItems: 'center', fontSize: 14 }}>
          <a className="nav-link">제품 소개</a>
          <a className="nav-link">요금</a>
          <a className="nav-link">도움말</a>
          <a href="Login.html" style={{ color: accent, textDecoration: 'none', fontWeight: 600 }}>로그인 →</a>
        </nav>
      </header>

      {/* main grid */}
      <main style={{
        position: 'relative', zIndex: 2,
        display: 'grid', gridTemplateColumns: '1.05fr 0.95fr',
        padding: '8px 80px 56px', gap: 80, alignItems: 'flex-start',
        height: 'calc(100% - 84px)', maxWidth: 1640, margin: '0 auto',
      }}>
        {/* headline + steps */}
        <section style={{ paddingTop: 30 }}>
          <div style={{ fontFamily: T.mono, fontSize: 11, letterSpacing: '0.3em', color: accent, marginBottom: 22, display: 'flex', alignItems: 'center', gap: 10 }}>
            <span style={{ width: 24, height: 1, background: accent }} />
            CREATE YOUR ACCOUNT
          </div>
          <h1 className="display" style={{
            margin: 0,
            fontFamily: T.serif, fontWeight: 700, fontSize: 68, lineHeight: 1.05,
          }}>
            {t.headline}<br/>
            <span className="grad-text" style={{ backgroundImage: `linear-gradient(120deg, ${accent}, #B8DCFF 60%, #fff)` }}>
              {t.headlineGrad}
            </span>
          </h1>
          <p style={{ fontSize: 16, color: 'rgba(232,238,255,0.7)', marginTop: 22, lineHeight: 1.65, maxWidth: 480 }}>
            {t.subtitle}
          </p>

          {t.showSteps && <Steps accent={accent} primary={primary} active={0} />}
        </section>

        {/* form */}
        <section style={{
          padding: '32px 32px 28px', borderRadius: 28,
          background: 'rgba(8,16,40,0.55)',
          border: '1px solid rgba(255,255,255,0.10)',
          backdropFilter: 'blur(28px)',
          WebkitBackdropFilter: 'blur(28px)',
          boxShadow: '0 30px 80px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08)',
          maxWidth: 480, justifySelf: 'end', width: '100%',
          marginTop: 20,
        }}>
          <div style={{ fontFamily: T.serif, fontSize: 24, fontWeight: 600, letterSpacing: '-0.02em' }}>
            계정 만들기
          </div>
          <div style={{ fontSize: 13.5, color: 'rgba(232,238,255,0.6)', marginTop: 6 }}>
            이미 계정이 있다면 <a href="Login.html" style={{ color: accent, textDecoration: 'none', fontWeight: 600 }}>로그인</a>
          </div>

          {/* social options first — common pattern for signup */}
          <div style={{ display: 'flex', gap: 8, marginTop: 22 }}>
            <SocialBtn kind="google" />
            <SocialBtn kind="kakao" />
            <SocialBtn kind="apple" />
          </div>

          <div style={{
            display: 'flex', alignItems: 'center', gap: 12, margin: '20px 0 18px',
            color: 'rgba(232,238,255,0.4)', fontSize: 11, letterSpacing: '0.2em',
          }}>
            <div style={{ flex: 1, height: 1, background: 'rgba(255,255,255,0.08)' }} />
            또는 이메일로
            <div style={{ flex: 1, height: 1, background: 'rgba(255,255,255,0.08)' }} />
          </div>

          <div style={{ display: 'grid', gap: 14 }}>
            <Field label="이메일" placeholder="you@example.com" value={email} onChange={setEmail} accent={accent} autoFocus />
            <Field label="닉네임" placeholder="공소 안에서 불릴 이름" value={nick} onChange={setNick} accent={accent}
              hint={`${nick.length}/20`} />
            <div>
              <Field
                label="비밀번호"
                type={showPw ? 'text' : 'password'}
                placeholder="8자 이상, 영문/숫자/기호 조합 권장"
                value={pw} onChange={setPw}
                accent={accent}
                trailing={<EyeToggle on={showPw} onToggle={() => setShowPw(!showPw)} />}
              />
              {/* strength bars */}
              <div style={{ display: 'flex', gap: 4, marginTop: 8 }}>
                {[0,1,2,3].map((i) => (
                  <div key={i} style={{
                    flex: 1, height: 3, borderRadius: 2,
                    background: i < strength.score
                      ? (strength.score < 2 ? '#FF7676' : strength.score < 3 ? '#FFC247' : accent)
                      : 'rgba(255,255,255,0.08)',
                    transition: 'background 200ms',
                  }} />
                ))}
              </div>
              <div style={{
                marginTop: 6, fontSize: 11.5,
                color: pw ? (strength.score < 2 ? '#FF9494' : strength.score < 3 ? '#FFC56B' : 'rgba(232,238,255,0.65)') : 'rgba(232,238,255,0.4)',
              }}>{strength.label}</div>
            </div>
            <Field
              label="비밀번호 확인"
              type={showPw ? 'text' : 'password'}
              placeholder="다시 한 번 입력"
              value={pw2} onChange={setPw2}
              accent={accent}
              error={pw2Error}
            />
          </div>

          {/* agreements */}
          <div style={{ display: 'grid', gap: 10, marginTop: 18, fontSize: 13, color: 'rgba(232,238,255,0.7)' }}>
            <label style={{ display: 'flex', gap: 10, cursor: 'pointer', alignItems: 'flex-start' }}>
              <input type="checkbox" checked={agree} onChange={(e) => setAgree(e.target.checked)} style={{ accentColor: accent, width: 16, height: 16, marginTop: 2, flex: 'none' }} />
              <span>
                <span style={{ color: '#fff', fontWeight: 600 }}>[필수]</span>{' '}
                <a style={{ color: accent, textDecoration: 'none' }}>이용약관</a> 및{' '}
                <a style={{ color: accent, textDecoration: 'none' }}>개인정보처리방침</a>에 동의합니다.
              </span>
            </label>
            <label style={{ display: 'flex', gap: 10, cursor: 'pointer', alignItems: 'flex-start' }}>
              <input type="checkbox" checked={agreeMkt} onChange={(e) => setAgreeMkt(e.target.checked)} style={{ accentColor: accent, width: 16, height: 16, marginTop: 2, flex: 'none' }} />
              <span>
                <span style={{ color: 'rgba(232,238,255,0.55)' }}>[선택]</span>{' '}
                독서 인사이트 뉴스레터를 받아볼래요.
              </span>
            </label>
          </div>

          <button disabled={!canSubmit} className="btn-primary" onClick={() => canSubmit && (location.href = 'Survey.html')} style={{
            marginTop: 22, width: '100%', height: 54, borderRadius: 14, border: 'none',
            background: `linear-gradient(135deg, ${accent} 0%, ${primary} 100%)`,
            color: '#04102E', fontSize: 16, fontWeight: 700, fontFamily: T.body,
            cursor: 'pointer',
            boxShadow: `0 14px 32px ${primary}80, inset 0 1px 0 rgba(255,255,255,0.5)`,
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
          }}>
            계정 만들고 시작하기
            <svg width="18" height="18" viewBox="0 0 16 16"><path d="M3 8h10M9 4l4 4-4 4" stroke="#04102E" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round" /></svg>
          </button>

          <div style={{
            marginTop: 16, paddingTop: 14, borderTop: '1px dashed rgba(255,255,255,0.08)',
            fontSize: 11.5, color: 'rgba(232,238,255,0.45)', lineHeight: 1.55, letterSpacing: '0.01em',
          }}>
            웹캠을 통해 시선 좌표만 일시 측정하며,<br/>
            영상은 저장되지 않습니다.
          </div>
        </section>
      </main>

    </div>
    </div>
    </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme">
          <TweakColor label="Primary" value={t.primary} onChange={(v) => setTweak('primary', v)}
            options={['#3D7BFF', '#1E5BE0', '#5B7CFF', '#2E66FF']} />
          <TweakColor label="Accent" value={t.accent} onChange={(v) => setTweak('accent', v)}
            options={['#5EC8FF', '#7DD9FF', '#3FB6FF', '#9BE0FF']} />
        </TweakSection>
        <TweakSection label="Copy">
          <TweakText label="헤드라인 1" value={t.headline} onChange={(v) => setTweak('headline', v)} />
          <TweakText label="헤드라인 2 (그라데이션)" value={t.headlineGrad} onChange={(v) => setTweak('headlineGrad', v)} />
          <TweakText label="서브타이틀" value={t.subtitle} onChange={(v) => setTweak('subtitle', v)} />
        </TweakSection>
        <TweakSection label="Decor">
          <TweakToggle label="3단계 스텝" value={t.showSteps} onChange={(v) => setTweak('showSteps', v)} />
          <TweakToggle label="시선 점 배경" value={t.showDots} onChange={(v) => setTweak('showDots', v)} />
        </TweakSection>
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Signup />);
</script>

</body>
</html>
